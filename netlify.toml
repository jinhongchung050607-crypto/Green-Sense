[build]
  command = "npm install --include=optional"
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "nft"
  included_files = ["knowledge/**", "utils/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
